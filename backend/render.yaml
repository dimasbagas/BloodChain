services:
  - type: web
    name: bloodchain-backend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 3600S
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 10000
